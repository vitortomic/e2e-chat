# Application
spring.application.name=e2e-chat-server
server.port=${PORT:3000}

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:e2echat}
spring.datasource.username=${DB_USER:chatuser}
spring.datasource.password=${DB_PASSWORD:chatpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=2000
spring.datasource.hikari.pool-name=E2EChatHikariCP

# Flyway (Database Migrations)
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true

# JWT Configuration
e2echat.jwt.secret=${JWT_SECRET:your-super-secret-jwt-key-change-this-in-production}
e2echat.jwt.expiration-ms=604800000

# CORS Configuration
e2echat.cors.origin=${CLIENT_URL:http://localhost:5173}

# Socket.IO Configuration
e2echat.socketio.port=${SOCKETIO_PORT:3001}

# Request size limit (for encrypted image messages)
server.tomcat.max-http-form-post-size=10485760
spring.servlet.multipart.max-request-size=10MB

# Virtual Threads (Java 21+)
spring.threads.virtual.enabled=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Logging
logging.level.root=INFO
logging.level.com.e2echat=DEBUG
logging.level.org.jdbi=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
